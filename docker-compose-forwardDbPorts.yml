services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      security16Host: ${SECURITY16_HOST:-forwards}
      security16Port: ${SECURITY16_PORT:-1433}
      PGHOST: ${PGHOST:-forwards}
      PGPORT: ${PGPORT:-5433}
      MONGO_PROXY_HOST: ${MONGO_PROXY_HOST:-forwards}
      PORT: 3003
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3003:3003"
    depends_on:
      - forwards
    restart: unless-stopped

  forwards:
    build:
      context: ./forwards
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      SECURITY16_FORWARDING_HOST: ${SECURITY16_FORWARDING_HOST:-localhost}
      SECURITY16_REMOTE_SQL_HOST: ${SECURITY16_REMOTE_SQL_HOST:-${SECURITY16_FORWARDING_HOST:-localhost}}
      SECURITY16_SSM_TARGET: ${SECURITY16_SSM_TARGET:-i-03c11f3bcfd51b0d9}
      PORT: 3004
      AWS_CONFIG_FILE: /root/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /root/.aws/credentials
      PORT_FORWARD_MONGO_BIND_ADDRESS: ${PORT_FORWARD_MONGO_BIND_ADDRESS:-0.0.0.0}
      PORT_FORWARD_MONGO_SSH_KEY_PATH: /run/keys/prodovrckey.pem
      PORT_FORWARD_SNOWDB_BIND_ADDRESS: ${PORT_FORWARD_SNOWDB_BIND_ADDRESS:-0.0.0.0}
      PORT_FORWARD_SNOWDB_SSH_KEY_PATH: /run/keys/snowdb.pem
      PORT_FORWARD_K8S_CONTEXT: ${PORT_FORWARD_K8S_CONTEXT:-arn:aws:eks:us-east-2:367507620554:cluster/prod-cloud-services-green}
      PORT_FORWARD_K8S_NAMESPACE: boot-services
      PORT_FORWARD_K8S_SERVICE: cs-license-process-boot
      PORT_FORWARD_K8S_POD: cs-license-process-boot
      PORT_FORWARD_K8S_LOCAL_PORT: "8061"
      PORT_FORWARD_K8S_POD_PORT: "80"
      PORT_FORWARD_K8S_ADDRESS: "0.0.0.0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME:-${USERPROFILE}}/.aws:/root/.aws:rw
      - ./prodovrckey.pem:/run/keys/prodovrckey.pem:ro
      - ./snowdb.pem:/run/keys/snowdb.pem:ro
      - ${HOME:-${USERPROFILE}}/.kube:/root/.kube:ro
    ports:
      - "3004:3004"
      - "8061:8061"
      - "1433:1433"
      - "5433:5433"
      - "9925:9925"
    restart: unless-stopped

  client:
    build:
      context: ./client-vite
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:3003/api}
        REACT_APP_FORWARDS_BASE_URL: ${REACT_APP_FORWARDS_BASE_URL:-http://localhost:3004/api}
        REACT_APP_D365_BASE_URL: ${REACT_APP_D365_BASE_URL:-http://localhost:8061}
    ports:
      - "3000:80"
      - "5173:5173"
    depends_on:
      - api
      - forwards
    restart: unless-stopped

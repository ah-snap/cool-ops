<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cool Ops Jira Linker options</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 16px;
        max-width: 480px;
      }
      label { display: block; font-size: 12px; margin-bottom: 4px; }
      input[type=text] { width: 100%; box-sizing: border-box; padding: 6px 8px; }
      .row { margin-bottom: 12px; }
      .status { font-size: 12px; color: #006644; min-height: 16px; }
      button { padding: 6px 12px; }
    </style>
  </head>
  <body>
    <h1 style="font-size: 16px; margin: 0 0 12px 0;">Cool Ops Jira Linker</h1>
    <div class="row">
      <label for="baseUrl">Cool Ops base URL</label>
      <input id="baseUrl" type="text" placeholder="http://localhost:5173" />
    </div>
    <div class="row">
      <button id="save">Save</button>
      <span id="status" class="status"></span>
    </div>
    <script src="options.js"></script>
  </body>
</html>

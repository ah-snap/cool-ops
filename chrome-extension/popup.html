<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cool Ops Jira Linker</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 12px;
        min-width: 260px;
      }
      label { display: block; font-size: 12px; margin-bottom: 4px; }
      input[type=text] { width: 100%; box-sizing: border-box; padding: 4px 6px; }
      .row { margin-bottom: 8px; }
      .status { font-size: 12px; color: #006644; min-height: 16px; }
      button { padding: 4px 10px; }
    </style>
  </head>
  <body>
    <div class="row">
      <label for="baseUrl">Cool Ops base URL</label>
      <input id="baseUrl" type="text" placeholder="http://localhost:5173" />
    </div>
    <div class="row">
      <button id="save">Save</button>
      <span id="status" class="status"></span>
    </div>
    <script src="options.js"></script>
  </body>
</html>

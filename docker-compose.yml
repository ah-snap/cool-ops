services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      security16Host: ${SECURITY16_HOST:-host.docker.internal}
      security16Port: ${SECURITY16_PORT:-1433}
      PGHOST: ${PGHOST:-host.docker.internal}
      PGPORT: ${PGPORT:-5433}
      PORT: 3003
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3003:3003"
    restart: unless-stopped

  client:
    build:
      context: ./client-vite
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:3003/api}
        REACT_APP_D365_BASE_URL: ${REACT_APP_D365_BASE_URL:-http://localhost:8061}
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
